const upColor = '#ef5350';
const downColor = '#26a69a';

function calcEMA(data, span) {
  const alpha = 2 / (span + 1);
  let ema = [data[0]];
  for (let i = 1; i < data.length; i++) {
    ema.push(alpha * data[i] + (1 - alpha) * ema[i-1]);
  }
  return ema;
}

let chartInstances = [];  // 当前所有chart实例
let currentFilter = 'all';
let currentSearch = '';

// 销毁所有旧实例
function destroyAllCharts() {
  chartInstances.forEach(c => {
    try { c.dispose(); } catch(e) {}
  });
  chartInstances = [];
}

// 渲染单只股票的三合一图表
function renderStock(container, idx) {
  const s = stockData[idx];
  const [code, name, sector, position, score, boxUpper, boxLower, dates, klines, volumes, var7, ma5, ma10, ma20] = s;
  const volColors = klines.map(k => k[1] >= k[0] ? upColor : downColor);
  const upperLine = dates.map(() => boxUpper);
  const lowerLine = dates.map(() => boxLower);
  const var7Ema = calcEMA(var7, 5);

  // K线
  const kEl = container.querySelector('.chart-kline');
  const kChart = echarts.init(kEl);
  kChart.setOption({
    animation: false,
    tooltip: { trigger: 'axis', axisPointer: { type: 'cross' }, backgroundColor: 'rgba(255,255,255,0.95)', borderColor: '#ddd', textStyle: { color: '#333', fontSize: 11 } },
    grid: { left: 50, right: 10, top: 8, bottom: 20 },
    xAxis: { type: 'category', data: dates, scale: true, boundaryGap: true, axisLine: {lineStyle:{color:'#ddd'}}, axisLabel: {show:false}, axisTick: {show:false} },
    yAxis: { scale: true, splitLine:{lineStyle:{color:'#f0f0f0'}}, axisLabel:{fontSize:10,color:'#666'} },
    dataZoom: [{ type: 'inside', start: 0, end: 100 }],
    series: [
      { type: 'candlestick', data: klines, itemStyle: { color: upColor, color0: downColor, borderColor: upColor, borderColor0: downColor } },
      { type: 'line', data: ma5, smooth: true, showSymbol: false, lineStyle: { color: '#ff9800', width: 1 } },
      { type: 'line', data: ma10, smooth: true, showSymbol: false, lineStyle: { color: '#9c27b0', width: 1 } },
      { type: 'line', data: ma20, smooth: true, showSymbol: false, lineStyle: { color: '#2196f3', width: 1 } },
      { type: 'line', data: upperLine, showSymbol: false, lineStyle: { color: '#e91e63', width: 1, type: 'dashed', opacity: 0.4 } },
      { type: 'line', data: lowerLine, showSymbol: false, lineStyle: { color: '#4caf50', width: 1, type: 'dashed', opacity: 0.4 } }
    ]
  });

  // 成交量
  const vEl = container.querySelector('.chart-vol');
  const vChart = echarts.init(vEl);
  vChart.setOption({
    animation: false,
    tooltip: { trigger: 'axis', backgroundColor: 'rgba(255,255,255,0.95)', borderColor: '#ddd', textStyle: { color: '#333', fontSize: 11 }, formatter: p => p[0].axisValue + '<br/>成交量: ' + Math.round(p[0].value/10000) + '万' },
    grid: { left: 50, right: 10, top: 4, bottom: 15 },
    xAxis: { type: 'category', data: dates, scale: true, boundaryGap: true, axisLine: {lineStyle:{color:'#ddd'}}, axisLabel: {show:false}, axisTick: {show:false} },
    yAxis: { scale: true, axisLabel: {show:false}, axisLine: {show:false}, axisTick: {show:false}, splitLine: {show:false} },
    dataZoom: [{ type: 'inside', start: 0, end: 100 }],
    series: [{ type: 'bar', data: volumes.map((v,i) => ({value: v, itemStyle:{color: volColors[i]}})), barWidth: '55%' }]
  });

  // VAR7
  const var7El = container.querySelector('.chart-var7');
  const var7Chart = echarts.init(var7El);
  var7Chart.setOption({
    animation: false,
    tooltip: { trigger: 'axis', backgroundColor: 'rgba(255,255,255,0.95)', borderColor: '#ddd', textStyle: { color: '#333', fontSize: 11 }, formatter: p => { let h = p[0].axisValue; p.forEach(x => { if(x.seriesName==='VAR7柱') h += '<br/>VAR7: ' + x.value; if(x.seriesName==='吸筹线') h += '<br/>吸筹线: ' + x.value.toFixed(1); }); return h; } },
    grid: { left: 50, right: 10, top: 8, bottom: 20 },
    xAxis: { type: 'category', data: dates, scale: true, boundaryGap: true, axisLine: {lineStyle:{color:'#ccc'}}, axisLabel: {show:true, fontSize:9, color:'#888', rotate:40, interval:5}, axisTick: {show:false} },
    yAxis: { scale: true, max: 100, axisLabel: {fontSize:9, color:'#666', formatter: v => v.toFixed(0)}, axisLine: {show:false}, splitLine: {lineStyle: {color:'#f0f0f0'}} },
    dataZoom: [{ type: 'inside', start: 0, end: 100 }],
    series: [
      { name: 'VAR7柱', type: 'bar', data: var7.map(v => ({ value: v, itemStyle: {color: v >= 30 ? '#e91e63' : (v >= 15 ? '#ff9800' : '#26a69a')} })), barWidth: '50%' },
      { name: '吸筹线', type: 'line', data: var7Ema, smooth: true, showSymbol: false, lineStyle: { color: '#4caf50', width: 1.5 }, z: 10 },
      { name: '阈值', type: 'line', data: dates.map(() => 30), showSymbol: false, lineStyle: { color: '#e91e63', width: 1, type: 'dashed', opacity: 0.4 } }
    ]
  });

  // 联动
  function syncZoom(src, targets) {
    src.on('dataZoom', function() {
      const opt = src.getOption();
      const dz = opt.dataZoom[0];
      targets.forEach(t => t.setOption({ dataZoom: [{ start: dz.start, end: dz.end }] }));
    });
  }
  syncZoom(kChart, [vChart, var7Chart]);
  syncZoom(vChart, [kChart, var7Chart]);
  syncZoom(var7Chart, [kChart, vChart]);

  chartInstances.push(kChart, vChart, var7Chart);
}

// 构建所有卡片
function buildCards() {
  // 先销毁所有旧实例
  destroyAllCharts();

  const container = document.getElementById('stockContainer');
  container.innerHTML = '';
  let visibleCount = 0;

  stockData.forEach((s, idx) => {
    const [code, name, sector, position, score, boxUpper, boxLower, dates, klines, volumes, var7] = s;

    // 过滤
    if (currentFilter !== 'all' && position !== currentFilter) return;
    if (currentSearch) {
      const q = currentSearch.toLowerCase();
      if (!code.toLowerCase().includes(q) && !name.toLowerCase().includes(q) && !sector.toLowerCase().includes(q)) return;
    }
    visibleCount++;

    const posStr = posMap[position] || position;
    const tagClass = posTagClass[position] || 'tag-near';
    const maxVar7 = Math.max(...var7).toFixed(1);
    const latestClose = klines[klines.length-1][1].toFixed(2);

    const card = document.createElement('div');
    card.className = 'stock-card';
    card.innerHTML = '<div class="stock-header">' +
      '<div class="stock-title"><span class="stock-name">' + name + '</span><span class="stock-code">' + code + '</span><span class="stock-sector">' + sector + '</span></div>' +
      '<div class="stock-tags"><span class="tag ' + tagClass + '">' + posStr + '</span><span class="tag tag-score">评分' + score + '</span></div>' +
      '</div>' +
      '<div class="chart-section">' +
      '<div class="section-label">日线 K线+MA均线</div>' +
      '<div class="chart-kline"></div>' +
      '<div class="section-label">成交量</div>' +
      '<div class="chart-side chart-vol"></div>' +
      '<div class="section-label">VAR7 主力吸筹</div>' +
      '<div class="chart-side chart-var7"></div>' +
      '</div>' +
      '<div class="stats-bar">' +
      '<span>箱体上沿 <strong>' + boxUpper.toFixed(2) + '</strong></span>' +
      '<span>箱体下沿 <strong>' + boxLower.toFixed(2) + '</strong></span>' +
      '<span>最新价 <strong>' + latestClose + '</strong></span>' +
      '<span>VAR7峰值 <strong>' + maxVar7 + '</strong></span>' +
      '</div>';

    container.appendChild(card);
    // 立即渲染该股票的图表
    renderStock(card, idx);
  });

  document.getElementById('resultCount').textContent = '显示 ' + visibleCount + ' 只';

  if (visibleCount === 0) {
    container.innerHTML = '<div class="no-result">没有匹配的股票</div>';
  }
}

function onFilterChange() {
  const activeBtn = document.querySelector('.filter-btn.active');
  currentFilter = activeBtn ? activeBtn.dataset.filter : 'all';
  currentSearch = document.getElementById('searchInput').value.trim();
  buildCards();
}

// 筛选按钮点击
document.getElementById('filterBar').addEventListener('click', function(e) {
  if (e.target.classList.contains('filter-btn')) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    onFilterChange();
  }
});

// 初始渲染
buildCards();

// resize
let resizeTimer;
window.addEventListener('resize', function() {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(function() {
    chartInstances.forEach(c => {
      try { c.resize(); } catch(e) {}
    });
  }, 200);
});
</script>
